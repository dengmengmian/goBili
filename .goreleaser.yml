# GoReleaser configuration for goBili.
# See https://goreleaser.com for documentation.
version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: default
    main: .
    binary: goBili
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/dengmengmian/goBili/cmd.Version={{ .Version }}
      - -X github.com/dengmengmian/goBili/cmd.BuildTime={{ .Date }}
      - -X github.com/dengmengmian/goBili/cmd.GitCommit={{ .Commit }}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dengmengmian
    name: goBili
  draft: false
  prerelease: auto
