# golangci-lint configuration for goBili.
# Run: golangci-lint run ./...

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true
  go: "1.21"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - misspell
    - unconvert
    - revive
    - nilerr
    - whitespace
    - errorlint
    - nilnil

linters-settings:
  errcheck:
    check-blank: true
    check-type-assertions: false
    exclude-functions:
      - (*os.File).Close
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write

  gosec:
    excludes:
      - G104 # Duplicated errcheck checks.
      - G204 # Subprocess launched with variable — ffmpeg is intentional.
      - G306 # Expect WriteFile permissions of 0600 or less — cookies.json is 0644 intentionally.

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: empty-block
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: errorf
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: unused-parameter
      - name: var-declaration
      - name: var-naming
      - name: waitgroup-by-value

  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-dirs:
    - vendor
  exclude-files:
    - ".*_test\\.go$"
